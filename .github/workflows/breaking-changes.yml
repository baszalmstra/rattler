name: Detect breaking changes

on:
  pull_request:
    types: [edited, opened, reopened, synchronize]

permissions:
  contents: read

concurrency:
  group: breaking-changes-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-semver:
    name: Check semver
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          lfs: false
          persist-credentials: false
          submodules: recursive

      - name: Install Nushell
        uses: hustcer/setup-nu@ccd5bb5426b05a32009c2ba967946231f3919c97 # v3.25
        with:
          version: "0.106.1"

      - name: Install Rust toolchain
        run: rustup show

      # Keep this version aligned with the release-plz action.
      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-semver-checks@0.48

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Run cargo-semver-checks
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_SHA: ${{ github.sha }}
        # HEAD is GitHub's synthetic merge commit. Its first parent is the exact
        # base revision used for this run.
        run: nu scripts/check-breaking-changes.nu ci "HEAD^1" semver-artifact

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          if-no-files-found: error
          name: semver-check-result
          path: semver-artifact/
          retention-days: 1
