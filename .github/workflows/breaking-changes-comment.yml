name: Detect breaking changes - Comment

on:
  workflow_run:
    workflows: [Detect breaking changes]
    types: [completed]

permissions:
  contents: read

concurrency:
  # Fork runs can omit pull_requests, so use one conservative fallback group.
  group: >-
    breaking-changes-comment-${{
      github.event.workflow_run.pull_requests[0].number ||
      'unassociated'
    }}
  cancel-in-progress: false

jobs:
  comment-on-pr:
    name: Comment on pull request
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion != 'cancelled'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      pull-requests: write
    steps:
      # workflow_run uses the trusted default-branch implementation. It must not
      # check out or execute pull-request-controlled code.
      - name: Checkout trusted comment script
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          lfs: false
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          environments: semver-check

      - name: Download result artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          github-token: ${{ github.token }}
          name: semver-check-result
          path: semver-artifact
          run-id: ${{ github.event.workflow_run.id }}

      - name: Update pull request comment
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          RUN_HEAD_REPOSITORY: ${{ github.event.workflow_run.head_repository.full_name }}
          RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: pixi run -e semver-check update-breaking-change-comment semver-artifact
